<section class="register-section">
  <h2>Login</h2>
  <form (ngSubmit)="onSubmit()">
    <div class="field">
      <label>Email</label>
      <input
        type="email"
        [(ngModel)]="email"
        name="email"
        required
      />
    </div>

    <div class="field">
      <label>Password</label>
      <input
        type="password"
        [(ngModel)]="password"
        name="password"
        required
      />
    </div>

    <p *ngIf="errorMessage" style="color: #e74c3c; font-size: 14px;">
      {{ errorMessage }}
    </p>

    <button type="submit">Login</button>

    <p style="margin-top: 15px;">
      Don't have an account? <a routerLink="/register">Register here</a>
    </p>
  </form>
</section>
